<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>AskMyNotes</title>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen flex flex-col items-center py-10 px-4">

  <header class="text-center mb-8">
    <h1 class="text-3xl sm:text-4xl font-bold text-indigo-600">AskMyNotes</h1>
    <p class="text-gray-600 mt-2">
      Upload a PDF. Ask a question. Get a grounded answer.
    </p>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>

  <main class="max-w-2xl w-full bg-white rounded-2xl shadow-md p-6 sm:p-10">
    <section class="mb-6">
      <label for="pdf-input" class="block text-sm font-medium text-gray-700 mb-2">
        Upload your notes (PDF)
      </label>
      <input
        type="file"
        id="pdf-input"
        accept="application/pdf"
        class="block w-full rounded-lg border border-gray-300 p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
      >
      <p id="upload-status" class="text-sm text-gray-500 mt-2 min-h-[1.25rem]"></p>
    </section>

    <section class="mb-6">
      <label for="question" class="block text-sm font-medium text-gray-700 mb-2">
        Your question
      </label>
      <textarea
        id="question"
        rows="3"
        placeholder="Type your question here..."
        class="block w-full rounded-lg border border-gray-300 p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-y"
      ></textarea>
      <button id="ask-btn" type="button" class="mt-2 w-full sm:w-auto bg-indigo-600 text-white font-semibold px-6 py-3 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
        Submit
      </button>
      <p id="status" class="text-sm text-gray-500 mt-2 min-h-[1.25rem]"></p>
    </section>

    <section>
      <div id="answer" hidden class="mt-8 p-6 bg-gray-50 rounded-lg border border-gray-200">
        <h2 class="text-xl font-semibold text-gray-800 mb-3">Answer</h2>
        <p id="qtype-pill" hidden class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium"></p>
        <p id="tool-pill" hidden class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-slate-200 text-slate-700"></p>
        <p id="answer-text" class="text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
        <details id="sources" hidden class="mt-4 p-4 bg-white rounded-lg border border-gray-200">
          <summary class="cursor-pointer text-sm font-medium text-indigo-600 hover:text-indigo-700 select-none">Sources</summary>
          <ul id="sources-list" class="list-decimal pl-6 mt-3 space-y-3 text-sm text-gray-700"></ul>
        </details>
      </div>
    </section>
  </main>

  <footer class="text-center text-sm text-gray-500 mt-12">
    <p>
      Built in the AI Engineering Bootcamp.
    </p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
